<!DOCTYPE html>
<html>
<body>

<h2>Members</h2>

<a href="/add-member">Add Member</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

<tr th:each="member : ${members}">
<td th:text="${member.id}"></td>
<td th:text="${member.firstName}"></td>
<td th:text="${member.email}"></td>
<td th:text="${member.phone}"></td>
</tr>

</table>

</body>
</html>
