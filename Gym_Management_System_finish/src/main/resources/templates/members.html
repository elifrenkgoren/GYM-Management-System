<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Members</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="/" class="navbar-brand">🏋️ Gym Management</a>
        <a href="/add-member" class="btn btn-success">Add Member</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Members List</h2>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Membership</th>
                        <th>Trainer</th>
                        <th>Monthly Fee</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.id}"></td>
                        <td th:text="${member.firstName}"></td>
                        <td th:text="${member.email}"></td>
                        <td th:text="${member.phone}"></td>
                        <td th:text="${member.membershipType}"></td>
                        <td th:text="${member.trainerName}"></td>
                        <td th:text="${member.monthlyFee}"></td>
                        <td>
                            <a th:href="@{/edit-member/{id}(id=${member.id})}" class="btn btn-primary btn-sm">Edit</a>
                            <a th:href="@{/delete-member/{id}(id=${member.id})}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>
    </div>

</div>

</body>
</html>
