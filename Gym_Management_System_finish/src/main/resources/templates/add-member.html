<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Member</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="/" class="navbar-brand">🏋️ Gym Management</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Add New Member</h2>

        <!-- ⭐ önemli: th:object ekledik -->
        <form action="/save-member" method="post" th:object="${member}">

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="firstName" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="lastName" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Membership Type</label>
                <select name="membershipType" class="form-select">
                    <option value="Basic">Basic</option>
                    <option value="Premium">Premium</option>
                    <option value="VIP">VIP</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Trainer Name</label>
                <input type="text" name="trainerName" class="form-control">
            </div>

            <!-- ⭐ BURASI GÜNCELLENDİ -->
            <div class="mb-3">
                <label class="form-label">Training Day</label>
                <select name="trainingDay" class="form-select" th:value="${member.trainingDay}">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
            </div>

            <!-- ⭐ BURASI GÜNCELLENDİ -->
            <div class="mb-3">
                <label class="form-label">Training Time</label>
                <input type="time" name="trainingTime" class="form-control" th:value="${member.trainingTime}">
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Fee</label>
                <input type="number" name="monthlyFee" class="form-control">
            </div>

            <button type="submit" class="btn btn-success w-100">Save Member</button>

        </form>
    </div>

</div>

</body>
</html>
