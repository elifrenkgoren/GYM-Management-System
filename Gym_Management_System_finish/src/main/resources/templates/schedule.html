<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">🏋️ Weekly Training Schedule</h2>

    <div class="row">

        <!-- MONDAY -->
        <div class="col">
            <h5 class="text-center">Monday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Monday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- TUESDAY -->
        <div class="col">
            <h5 class="text-center">Tuesday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Tuesday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- WEDNESDAY -->
        <div class="col">
            <h5 class="text-center">Wednesday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Wednesday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- THURSDAY -->
        <div class="col">
            <h5 class="text-center">Thursday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Thursday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- FRIDAY -->
        <div class="col">
            <h5 class="text-center">Friday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Friday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- SATURDAY -->
        <div class="col">
            <h5 class="text-center">Saturday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Saturday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

        <!-- SUNDAY -->
        <div class="col">
            <h5 class="text-center">Sunday</h5>
            <div th:each="m : ${members}">
                <div th:if="${m.trainingDay == 'Sunday'}" class="card mb-2 p-2 shadow-sm">
                    <b th:text="${m.firstName}"></b><br>
                    <span th:text="${m.trainingTime}"></span><br>
                    <small th:text="${m.trainerName}"></small>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
